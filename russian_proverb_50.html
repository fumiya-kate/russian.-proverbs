<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>今日のロシア語格言</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#f6f6f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  background:#fff;
  padding:32px 24px;
  border-radius:14px;
  max-width:500px;
  width:90%;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  text-align:center;
}
.title{
  font-size:13px;
  letter-spacing:.12em;
  color:#888;
  margin-bottom:18px;
}
.proverb{
  font-size:20px;
  margin-bottom:18px;
}
.translation{
  font-size:14px;
  color:#666;
}
.date{
  margin-top:24px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>
<body>

<div class="card">
<div class="title">今日のロシア語格言</div>
<div id="proverb" class="proverb"></div>
<div id="translation" class="translation"></div>
<div id="date" class="date"></div>
</div>

<script>
const proverbs = [
{ru:"Терпение и труд всё перетрут.",ja:"忍耐と努力はすべてを乗り越える。"},
{ru:"Без труда не вытащишь и рыбку из пруда.",ja:"努力なしに成果は得られない。"},
{ru:"Семь раз отмерь, один раз отрежь.",ja:"七度測って一度切れ。"},
{ru:"Не имей сто рублей, а имей сто друзей.",ja:"百ルーブルより百人の友を持て。"},
{ru:"Доверяй, но проверяй.",ja:"信頼せよ、しかし確認せよ。"},
{ru:"Слово — серебро, молчание — золото.",ja:"言葉は銀、沈黙は金。"},
{ru:"Поспешишь — людей насмешишь.",ja:"急げば人に笑われる。"},
{ru:"Век живи — век учись.",ja:"生涯学び続けよ。"},
{ru:"Лучше поздно, чем никогда.",ja:"遅くてもやらないよりは良い。"},
{ru:"Не всё то золото, что блестит.",ja:"光るものすべて金ならず。"},
{ru:"Глаза боятся, а руки делают.",ja:"目は怖がるが手は動く。"},
{ru:"Делу время, потехе час.",ja:"仕事に時間を、遊びにひとときを。"},
{ru:"Друг познаётся в беде.",ja:"友は困難の中でこそ分かる。"},
{ru:"Береги платье снову, а честь смолоду.",ja:"服は新しいうちに、名誉は若いうちに守れ。"},
{ru:"Повторение — мать учения.",ja:"反復は学習の母。"},
{ru:"Тише едешь — дальше будешь.",ja:"急がば回れ。"},
{ru:"Нет дыма без огня.",ja:"火のない所に煙は立たぬ。"},
{ru:"На ошибках учатся.",ja:"人は失敗から学ぶ。"},
{ru:"Старый друг лучше новых двух.",ja:"古い友は新しい友二人に勝る。"},
{ru:"Время — деньги.",ja:"時は金なり。"},
{ru:"Аппетит приходит во время еды.",ja:"食欲は食べるうちに湧く。"},
{ru:"Беда не приходит одна.",ja:"災いは単独では来ない。"},
{ru:"В гостях хорошо, а дома лучше.",ja:"よそは良いが家が一番。"},
{ru:"За двумя зайцами погонишься — ни одного не поймаешь.",ja:"二兎を追う者は一兎をも得ず。"},
{ru:"И волки сыты, и овцы целы.",ja:"両者が満足する。"},
{ru:"Кончил дело — гуляй смело.",ja:"仕事が終わったら堂々と休め。"},
{ru:"Любишь кататься — люби и саночки возить.",ja:"楽しむなら労も受け入れよ。"},
{ru:"Москва не сразу строилась.",ja:"ローマは一日にして成らず。"},
{ru:"На вкус и цвет товарищей нет.",ja:"好みは人それぞれ。"},
{ru:"Не откладывай на завтра то, что можно сделать сегодня.",ja:"今日できることを明日に延ばすな。"},
{ru:"Нет худа без добра.",ja:"悪いことにも良い面がある。"},
{ru:"Один в поле не воин.",ja:"一人では戦えない。"},
{ru:"Под лежачий камень вода не течёт.",ja:"行動しなければ何も起こらない。"},
{ru:"После дождичка в четверг.",ja:"いつになるか分からない。"},
{ru:"Работа не волк — в лес не убежит.",ja:"仕事は逃げない。"},
{ru:"С миру по нитке — голому рубаха.",ja:"塵も積もれば山となる。"},
{ru:"Сколько людей, столько мнений.",ja:"人の数だけ意見がある。"},
{ru:"Смех без причины — признак дурачины.",ja:"理由なき笑いは愚かさの印。"},
{ru:"Там хорошо, где нас нет.",ja:"隣の芝生は青い。"},
{ru:"У страха глаза велики.",ja:"恐怖は誇張する。"},
{ru:"Хлеб — всему голова.",ja:"パンはすべての基本。"},
{ru:"Человек предполагает, а Бог располагает.",ja:"人は計画し、神は決定する。"},
{ru:"Что посеешь, то и пожнёшь.",ja:"蒔いた種は自分で刈り取る。"},
{ru:"Язык до Киева доведёт.",ja:"聞けば道は開ける。"},
{ru:"Без прошлого нет будущего.",ja:"過去なくして未来なし。"},
{ru:"Вода камень точит.",ja:"継続は力なり。"},
{ru:"Где тонко, там и рвётся.",ja:"弱い所から壊れる。"},
{ru:"Доброе слово и кошке приятно.",ja:"優しい言葉は猫にも嬉しい。"},
{ru:"Не имей сто друзей, а имей сто рублей.",ja:"友より金を持て（皮肉表現）。"},
{ru:"Ученье свет, а неученье тьма.",ja:"学びは光、無知は闇。"}
];

const today=new Date();
const index=today.getFullYear()*1000+today.getMonth()*50+today.getDate();
const proverb=proverbs[index%proverbs.length];

document.getElementById("proverb").textContent=proverb.ru;
document.getElementById("translation").textContent=proverb.ja;
document.getElementById("date").textContent=
today.getFullYear()+"年"+
(today.getMonth()+1)+"月"+
today.getDate()+"日";
</script>

</body>
</html>
